<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niharika ❤️ Ayam</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:linear-gradient(135deg,#ff9eb5,#ff6f91);
font-family:cursive;
font-weight:bold;
overflow:hidden;
text-align:center;
color:white;
height:100vh;
}

/* FLOATING HEARTS */

body::before,
body::after{
content:"❤️";
position:absolute;
font-size:40px;
animation:float 6s infinite linear;
opacity:0.4;
}

body::before{
left:10%;
top:100%;
}

body::after{
right:15%;
top:100%;
animation-delay:3s;
}

@keyframes float{

0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}

20%{
opacity:0.5;
}

100%{
transform:translateY(-120vh) rotate(360deg);
opacity:0;
}

}

/* PAGE */

.page{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
animation:fade 1s ease;
}

@keyframes fade{

from{
opacity:0;
transform:scale(0.95);
}

to{
opacity:1;
transform:scale(1);
}

}

/* PHOTO */

.photo{
width:300px;
max-width:90%;
border-radius:25px;
border:5px solid white;
margin-bottom:20px;
box-shadow:0 0 25px rgba(255,255,255,0.8);
animation:softMove 3s infinite ease-in-out;
}

@keyframes softMove{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0px);
}

}

/* TEXT */

h1{
font-size:40px;
margin-bottom:20px;
text-shadow:0 0 10px rgba(255,255,255,0.8);
}

/* BUTTONS */

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:40px;
background:white;
color:#ff4d88;
font-weight:bold;
margin:10px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(255,255,255,0.5);
font-family:cursive;
}

button:hover{
transform:scale(1.1);
background:#ffe6ee;
}

.hidden{
display:none;
}

/* FINAL TEXT */

.final{
font-size:32px;
line-height:1.8;
padding:20px;
animation:glow 2s infinite alternate;
}

@keyframes glow{

from{
text-shadow:0 0 10px white;
}

to{
text-shadow:0 0 25px #fff;
}

}

/* NO BUTTON */

#noBtn{
position:relative;
transition:0.2s;
}

</style>
</head>

<body>

<!-- PAGE 1 -->

<div class="page" id="page1">

<img 
class="photo"
src="https://i.ibb.co/67YnfgRn/IMG-20260526-WA0001.jpg"
>

<h1>
I Want To Ask U Something... 💖
</h1>

<button onclick="nextPage()">
What? 👀
</button>

</div>

<!-- PAGE 2 -->

<div class="page hidden" id="page2">

<h1>
Will You Marry Me? 💍
</h1>

<div>

<button onclick="finalPage()">
Yes ❤️
</button>

<button id="noBtn">
No 💔
</button>

</div>

</div>

<!-- PAGE 3 -->

<div class="page hidden" id="page3">

<div class="final">
Ayam Will Always Love Niharika Forever ❤️
<br><br>
Ayam Loves Niharika Forever 💖
</div>

</div>

<!-- SONG -->

<audio id="song" loop preload="auto">

<source src="https://files.catbox.moe/nyg24y.mp3" type="audio/mp3">

</audio>

<script>

const song = document.getElementById("song");
const noBtn = document.getElementById("noBtn");

/* NEXT PAGE + SONG */

function nextPage(){

document.getElementById("page1").classList.add("hidden");

document.getElementById("page2").classList.remove("hidden");

/* PLAY SONG */

song.volume = 1;

let playPromise = song.play();

if(playPromise !== undefined){

playPromise.then(_ => {

console.log("Song Playing");

})

.catch(error => {

console.log("Autoplay Blocked");

});

}

}

/* FINAL PAGE */

function finalPage(){

document.getElementById("page2").classList.add("hidden");

document.getElementById("page3").classList.remove("hidden");

}

/* MOVING NO BUTTON */

noBtn.addEventListener("mouseover", moveButton);

noBtn.addEventListener("click", moveButton);

function moveButton(){

const x = Math.floor(Math.random()*300)-150;

const y = Math.floor(Math.random()*300)-150;

noBtn.style.transform = `translate(${x}px, ${y}px)`;

}

</script>

</body>
</html>
